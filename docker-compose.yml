services:
  hpb-monitor:
    build: .
    image: hpb-monitor
    container_name: hpb-monitor
    restart: unless-stopped
    ports:
      - "127.0.0.1:5050:5000"   # loopback-only; reached via the host's nginx
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
